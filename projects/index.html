<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المشاريع | RAGEOMATICS</title>
  <meta name="description" content="استعرض مشاريع RAGEOMATICS في تصميم الطرق، GIS، الرفع المساحي والتحليل الهيدرولوجي." />

  <link rel="canonical" href="https://www.rageomatics.me/projects/" />
  <link rel="alternate" hreflang="ar" href="https://www.rageomatics.me/projects/" />
  <link rel="alternate" hreflang="en" href="https://www.rageomatics.me/en/projects/" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/site.css" />
</head>
<body>
  <a class="skip-link" href="#content">تخطي إلى المحتوى</a>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="../index.html">
        <img src="../images/logo.png" alt="RAGEOMATICS Logo" onerror="this.src='https://placehold.co/88x44/f59e0b/ffffff?text=RA'">
        <span>RAGEOMATICS</span>
      </a>
      <nav class="nav-links" aria-label="التنقل الرئيسي">
        <a href="../index.html">الرئيسية</a>
        <a href="../about.html">من نحن</a>
        <a href="../blog/index.html">المدونة</a>
        <a href="../contact.html">تواصل</a>
        <a class="btn" href="https://wa.me/967771305123" target="_blank" rel="noopener">واتساب</a>
        <a href="../en/projects/index.html">EN</a>
      </nav>
    </div>
  </header>

  <main id="content">
    <section class="hero">
      <div class="container">
        <h1>المشاريع</h1>
        <p>قائمة مشاريعنا مع نبذة مختصرة. (يمكنك إضافة المزيد من خلال ملف <code>data/projects.json</code>).</p>
      </div>
    </section>

    <section class="container" style="padding:24px 0;">
      <div class="card" style="margin-bottom:16px;">
        <label style="font-weight:900;">بحث</label>
        <input id="q" type="search" placeholder="ابحث باسم المشروع أو التصنيف..." style="width:100%; padding:12px; border:1px solid #e5e7eb; border-radius:12px; margin-top:8px;">
      </div>

      <div id="grid" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container" style="text-align:center;">
      <div style="font-weight:900;">RAGEOMATICS</div>
      <p class="small">© <span data-year></span> آر إي جيوماتكس. جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script src="../assets/js/site.js" defer></script>
  <script defer>
    (async function(){
      const grid = document.getElementById('grid');
      const q = document.getElementById('q');

      let items = [];
      try{
        const res = await fetch('../data/projects.json', { cache: 'no-store' });
        items = await res.json();
      }catch(e){
        grid.innerHTML = '<div class="card">تعذر تحميل المشاريع.</div>';
        return;
      }

      function render(){
        const term = (q.value || '').trim().toLowerCase();
        const filtered = items.filter(p => {
          const hay = (p.title_ar + ' ' + p.category + ' ' + p.location_ar).toLowerCase();
          return hay.includes(term);
        });

        grid.innerHTML = filtered.map(p => `
          <article class="card span-6">
            <img src="${p.image}" alt="${p.title_ar}" style="width:100%; height:220px; object-fit:cover; border-radius:14px; border:1px solid #eef2f7;"
              onerror="this.src='https://placehold.co/900x500/eee/999?text=Project';">
            <h2 style="margin:14px 0 6px; font-size:20px;">${p.title_ar}</h2>
            <div class="muted">${p.category} • ${p.year} • ${p.location_ar}</div>
            <p class="muted" style="margin-top:10px;">${p.excerpt_ar}</p>
          </article>
        `).join('') || '<div class="card">لا توجد نتائج.</div>';
      }

      q.addEventListener('input', render);
      render();
    })();
  </script>
</body>
</html>

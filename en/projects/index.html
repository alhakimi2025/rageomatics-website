<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects | RAGEOMATICS</title>
  <meta name="description" content="Explore RAGEOMATICS projects across road design, GIS, surveying and hydrology." />

  <link rel="canonical" href="https://www.rageomatics.me/en/projects/" />
  <link rel="alternate" hreflang="ar" href="https://www.rageomatics.me/projects/" />
  <link rel="alternate" hreflang="en" href="https://www.rageomatics.me/en/projects/" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/site.css" />
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="../../index.html">
        <img src="../../images/logo.png" alt="RAGEOMATICS Logo" onerror="this.src='https://placehold.co/88x44/f59e0b/ffffff?text=RA'">
        <span>RAGEOMATICS</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="../../index.html">Home</a>
        <a href="../about.html">About</a>
        <a href="../blog/index.html">Blog</a>
        <a href="../contact.html">Contact</a>
        <a class="btn" href="https://wa.me/967771305123" target="_blank" rel="noopener">WhatsApp</a>
        <a href="../../projects/index.html">AR</a>
      </nav>
    </div>
  </header>

  <main id="content">
    <section class="hero">
      <div class="container">
        <h1>Projects</h1>
        <p>Data-driven list from <code>data/projects.json</code>.</p>
      </div>
    </section>

    <section class="container" style="padding:24px 0;">
      <div class="card" style="margin-bottom:16px;">
        <label style="font-weight:900;">Search</label>
        <input id="q" type="search" placeholder="Search by title or category..." style="width:100%; padding:12px; border:1px solid #e5e7eb; border-radius:12px; margin-top:8px;">
      </div>

      <div id="grid" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container" style="text-align:center;">
      <div style="font-weight:900;">RAGEOMATICS</div>
      <p class="small">© <span data-year></span> RAGEOMATICS. All rights reserved.</p>
    </div>
  </footer>

  <script src="../../assets/js/site.js" defer></script>
  <script defer>
    (async function(){
      const grid = document.getElementById('grid');
      const q = document.getElementById('q');

      let items = [];
      try{
        const res = await fetch('../../data/projects.json', { cache: 'no-store' });
        items = await res.json();
      }catch(e){
        grid.innerHTML = '<div class="card">Failed to load projects.</div>';
        return;
      }

      function render(){
        const term = (q.value || '').trim().toLowerCase();
        const filtered = items.filter(p => {
          const hay = (p.title_en + ' ' + p.category + ' ' + p.location_en).toLowerCase();
          return hay.includes(term);
        });

        grid.innerHTML = filtered.map(p => `
          <article class="card span-6">
            <img src="${p.image.replace('../','../../')}" alt="${p.title_en}" style="width:100%; height:220px; object-fit:cover; border-radius:14px; border:1px solid #eef2f7;"
              onerror="this.src='https://placehold.co/900x500/eee/999?text=Project';">
            <h2 style="margin:14px 0 6px; font-size:20px;">${p.title_en}</h2>
            <div class="muted">${p.category} • ${p.year} • ${p.location_en}</div>
            <p class="muted" style="margin-top:10px;">${p.excerpt_en}</p>
          </article>
        `).join('') || '<div class="card">No results.</div>';
      }

      q.addEventListener('input', render);
      render();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | RAGEOMATICS</title>
  <meta name="description" content="Engineering and geomatics articles by RAGEOMATICS covering Civil 3D, ArcGIS Pro, surveying, and hydrology." />

  <link rel="canonical" href="https://www.rageomatics.me/en/blog/" />
  <link rel="alternate" hreflang="ar" href="https://www.rageomatics.me/blog/" />
  <link rel="alternate" hreflang="en" href="https://www.rageomatics.me/en/blog/" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/site.css" />
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="../../index.html">
        <img src="../../images/logo.png" alt="RAGEOMATICS Logo" onerror="this.src='https://placehold.co/88x44/f59e0b/ffffff?text=RA'">
        <span>RAGEOMATICS</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="../../index.html">Home</a>
        <a href="../about.html">About</a>
        <a href="../projects/index.html">Projects</a>
        <a href="../contact.html">Contact</a>
        <a class="btn" href="https://wa.me/967771305123" target="_blank" rel="noopener">WhatsApp</a>
        <a href="../../blog/index.html">AR</a>
      </nav>
    </div>
  </header>

  <main id="content">
    <section class="hero">
      <div class="container">
        <h1>Blog</h1>
        <p>Short articles that explain our work and deliverables.</p>
      </div>
    </section>

    <section class="container" style="padding:24px 0;">
      <div id="posts" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container" style="text-align:center;">
      <div style="font-weight:900;">RAGEOMATICS</div>
      <p class="small">© <span data-year></span> RAGEOMATICS. All rights reserved.</p>
    </div>
  </footer>

  <script src="../../assets/js/site.js" defer></script>
  <script defer>
    (async function(){
      const el = document.getElementById('posts');
      let posts = [];
      try {
        const res = await fetch('../../data/posts.json', { cache: 'no-store' });
        posts = await res.json();
      } catch(e){
        el.innerHTML = '<div class="card">Failed to load posts.</div>';
        return;
      }

      el.innerHTML = posts.map(p => `
        <article class="card span-6">
          <h2 style="margin:0 0 6px; font-size:20px;">${p.title_en}</h2>
          <div class="muted">${p.date} • ${(p.tags||[]).join(', ')}</div>
          <p class="muted" style="margin-top:10px;">${p.excerpt_en}</p>
          <a class="btn" href="${p.url_en}" style="margin-top:10px;">Read</a>
        </article>
      `).join('') || '<div class="card">No posts yet.</div>';
    })();
  </script>
</body>
</html>
